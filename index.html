<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Prankid World</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main>
    <div class="hero-scroll"></div>

    <section class="hero">
      <div class="hero__media">
        <video
          class="hero__video"
          muted
          playsinline
          webkit-playsinline
          disablePictureInPicture
          preload="auto"
        >
          <source src="pran.mp4" type="video/mp4">
        </video>
        <canvas class="hero__canvas"></canvas>
        <div class="hero__overlay"></div>
      </div>
    </section>

    <section class="tagline">
      <h1 class="tagline__text">FREEDOM AND SUCCESS</h1>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
